<div class="grid grid-cols-12 gap-2 rounded-lg border border-gray-100 bg-gray-50 p-3">
    <input type="hidden" name="ingredient_id[]" value="">
    <div class="col-span-12">
        <label class="block text-xs font-semibold text-gray-600 mb-1">Ingredient</label>
        <input name="ingredient_name[]" class="form-input" placeholder="e.g. eggs, plantain, ndole leaves">
    </div>
    <div class="col-span-4">
        <label class="block text-xs font-semibold text-gray-600 mb-1">Quantity</label>
        <input name="ingredient_quantity[]" type="number" step="0.01" min="0" class="form-input" placeholder="2">
    </div>
    <div class="col-span-4">
        <label class="block text-xs font-semibold text-gray-600 mb-1">Unit</label>
        <input name="ingredient_unit[]" class="form-input" placeholder="g, kg, pcs">
    </div>
    <div class="col-span-4">
        <label class="block text-xs font-semibold text-gray-600 mb-1">Unit price</label>
        <input name="ingredient_unit_price_xaf[]" type="number" step="0.01" min="0" class="form-input" placeholder="XAF">
    </div>
</div>
